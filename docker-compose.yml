services:
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - MCP_URL=http://mcp:8001/sse
    depends_on:
      - mcp
      - qdrant

volumes:
  qdrant_data: